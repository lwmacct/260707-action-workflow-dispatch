name: Test Dispatch Target

on:
  workflow_dispatch:
    inputs:
      source-repository:
        description: Source repository forwarded by action-workflow-dispatch.
        required: true
        type: string
      source-tag:
        description: Test tag forwarded by action-workflow-dispatch.
        required: true
        type: string
      source-sha:
        description: Test SHA forwarded by action-workflow-dispatch.
        required: true
        type: string
      source-base-ref:
        description: Source base ref forwarded by action-workflow-dispatch.
        required: false
        type: string
      source-run-id:
        description: Source workflow run ID.
        required: true
        type: string
      source-ref:
        description: Source workflow ref name.
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify dispatched inputs
    runs-on: ubuntu-latest

    steps:
      - name: Verify inputs
        env:
          SOURCE_REPOSITORY: ${{ inputs.source-repository }}
          TAG: ${{ inputs.source-tag }}
          SHA: ${{ inputs.source-sha }}
          SOURCE_BASE_REF: ${{ inputs.source-base-ref }}
          SOURCE_RUN_ID: ${{ inputs.source-run-id }}
          SOURCE_REF: ${{ inputs.source-ref }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          test "${SOURCE_REPOSITORY}" = "${EXPECTED_REPOSITORY}"
          test "${TAG}" = "v0.0.0-test"
          test -n "${SHA}"
          test -n "${SOURCE_BASE_REF}"
          test -n "${SOURCE_RUN_ID}"
          test -n "${SOURCE_REF}"
